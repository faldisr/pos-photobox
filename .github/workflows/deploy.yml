name: Deploy Next.js to Webuzo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

      - name: Prepare Standalone Build
        run: |
          rm -rf deploy
          mkdir -p deploy

          cp -r .next/standalone/* deploy/

          mkdir -p deploy/.next
          cp -r .next/static deploy/.next/static

          if [ -d public ]; then
            cp -r public deploy/public
          fi

          mkdir -p deploy/tmp
          date > deploy/tmp/restart.txt

      - name: Check Deploy Size
        run: du -sh deploy

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          protocol: ftp
          port: 21

          local-dir: deploy/
          server-dir: /home/developer/public_html/pos/

          dangerous-clean-slate: false

          timeout: 120000

          log-level: verbose

          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            README.md
