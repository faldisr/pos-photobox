name: Deploy Next.js Webuzo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Prepare Standalone
        run: |
          mkdir deploy
          cp -r .next/standalone/* deploy/

          mkdir -p deploy/.next
          cp -r .next/static deploy/.next/static

          if [ -d public ]; then
            cp -r public deploy/public
          fi

      - name: Create Restart Trigger
        run: |
          mkdir -p deploy/tmp
          date > deploy/tmp/restart.txt

      - name: Upload FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 101.50.1.12
          username: developer
          password: ${{ secrets.FTP_PASSWORD }}

          protocol: ftp
          port: 21

          local-dir: deploy/
          server-dir: /home/developer/public_html/pos/

          exclude: |
            **/.git*
            **/.github/**
