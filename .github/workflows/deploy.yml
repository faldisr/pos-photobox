name: Build and Deploy to Rumahweb

on:
  push:
    branches:
      - main # Proses berjalan tiap kali Anda melakukan push ke branch main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil Kode dari Repository
        uses: actions/checkout@v4

      - name: Pinjam Node.js dari GitHub
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies (Di Server GitHub)
        run: npm ci

      - name: Build Project (Di Server GitHub)
        run: npm run build

      - name: Kirim File Hasil Build ke Rumahweb via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/ # Folder hasil build Next.js statis
          server-dir: ./ # Akan langsung masuk ke folder yang diatur di FTP cPanel
